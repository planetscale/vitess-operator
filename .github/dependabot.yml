version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      all:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/build/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      all:
        patterns:
          - "*"

